<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- ORGANIZAÇÃO -->
  <symbol id="organizacao" viewBox="0 0 24 24">
    <rect x="3" y="3" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="14" y="3" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="3" y="14" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="14" y="14" width="7" height="7" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>

  <!-- COZINHA -->
  <symbol id="cozinha" viewBox="0 0 24 24">
    <path d="M7 3v11M11 3v11M7 7h4M6 14h6v7H6z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"/>
    <path d="M16 3v18"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"/>
  </symbol>

  <!-- ILUMINAÇÃO -->
  <symbol id="iluminacao" viewBox="0 0 24 24">
    <path d="M12 2a7 7 0 00-4 13c.6.5 1 1.3 1 2h6c0-.7.4-1.5 1-2a7 7 0 00-4-13z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
    <line x1="9" y1="21" x2="15" y2="21"
          stroke="currentColor"
          stroke-width="2"/>
  </symbol>

  <!-- CASA INTELIGENTE -->
  <symbol id="casa-inteligente" viewBox="0 0 24 24">
    <path d="M3 10l9-7 9 7v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
    <circle cx="12" cy="15" r="2"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
  </symbol>

  <!-- LIMPEZA (ASPIRADOR SIMBÓLICO) -->
  <symbol id="limpeza" viewBox="0 0 24 24">
  <!-- corpo principal (aspirador robô) -->
  <circle cx="12" cy="13" r="7"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>

  <!-- detalhe interno (sensor / tampa) -->
  <circle cx="12" cy="13" r="2"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>

  <!-- base/sombra inferior -->
  <path d="M8 20h8"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- pequeno “sensor” superior -->
  <path d="M12 4v2"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"/>
</symbol>

  <!-- CONFORTO -->
  <symbol id="conforto" viewBox="0 0 24 24">
    <path d="M4 12c3-6 13-6 16 0"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
    <path d="M6 16c2-4 10-4 12 0"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
    <path d="M8 20c1-2 7-2 8 0"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
  </symbol>

  <!-- HEART -->
  <symbol id="heart" viewBox="0 0 24 24">
    <path d="M12 21s-7-4.6-9.5-9A5.5 5.5 0 0112 5a5.5 5.5 0 019.5 7c-2.5 4.4-9.5 9-9.5 9z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
  </symbol>

  <!-- STAR -->
  <symbol id="star" viewBox="0 0 24 24">
    <path d="M12 3l2.8 6 6.2.5-4.7 4 1.4 6.1L12 16.8 6.3 19.6 7.7 13.5 3 9.5 9.2 9z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linejoin="round"/>
  </symbol>

  <!-- CART -->
  <symbol id="cart" viewBox="0 0 24 24">
    <circle cx="9" cy="20" r="1.5"/>
    <circle cx="18" cy="20" r="1.5"/>
    <path d="M3 4h2l2.2 10h11.5l2-7H7.2"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linejoin="round"
          stroke-linecap="round"/>
  </symbol>

</svg>
