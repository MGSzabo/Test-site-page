     stroke="currentColor"
     stroke-width="1.8"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- Disco superior -->
    <ellipse cx="32" cy="21.5" rx="17" ry="7"/>

    <!-- Corpo lateral -->
    <path d="
      M15 21.5
      V31
      C15 40 22.5 47 32 47
      C41.5 47 49 40 49 31
      V21.5"/>

    <!-- Botão -->
    <ellipse cx="32" cy="21.5" rx="2.7" ry="1.4"/>

    <!-- Faixa frontal -->
    <path d="
      M20 31
      C24 34 40 34 44 31"/>

    <!-- Aberturas laterais -->
    <path d="
      M20.5 28.5
      C22.5 29.7 25.5 30.1 28 29.5"/>

    <path d="
      M36 29.5
      C38.5 30.1 41.5 29.7 43.5 28.5"/>

    <!-- Base -->
    <path d="
      M22 41
      C27 43 37 43 42 41"/>

  </g>
</symbol>

